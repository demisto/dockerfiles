name: Autolock PR Auto-merge
on: pull_request

permissions:
  pull-requests: write
  contents: write

jobs:
  autolock-automerge:
    runs-on: ubuntu-latest
    if: ${{ github.event.pull_request.user.login == 'content-bot' }}
    steps:
      - name: Debug context
        run: |
          echo "github.actor: ${{ github.actor }}"
          echo "github.event.pull_request.user.login: ${{ github.event.pull_request.user.login }}"
          echo "github.event.sender.login: ${{ github.event.sender.login }}"
          echo "github.head_ref: ${{ github.head_ref }}"
          echo "github.event.action: ${{ github.event.action }}"

      - name: Validate branch name
        id: validate_branch
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: |
          if [[ "$BRANCH_NAME" == autolock/* ]]; then
            echo "valid_branch=true" >> $GITHUB_OUTPUT
            echo "Branch name '$BRANCH_NAME' starts with 'autolock/' - proceeding with automerge"
          else
            echo "valid_branch=false" >> $GITHUB_OUTPUT
            echo "Branch name '$BRANCH_NAME' does not start with 'autolock/' - skipping automerge"
          fi
      
      - name: Check commit count
        if: steps.validate_branch.outputs.valid_branch == 'true'
        id: check_commits
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          COMMIT_COUNT=$(gh pr view "$PR_URL" --json commits --jq '.commits | length')
          echo "commit_count=$COMMIT_COUNT" >> $GITHUB_OUTPUT
          echo "PR has $COMMIT_COUNT commit(s)"
          if [[ "$COMMIT_COUNT" -ne 1 ]]; then
            echo "Skipping automerge - PR has $COMMIT_COUNT commits (expected exactly 1)"
          fi

      - name: Approve and enable auto-merge
        if: steps.validate_branch.outputs.valid_branch == 'true' && steps.check_commits.outputs.commit_count == '1'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Approving PR and enabling auto-merge"
          gh pr review --approve "$PR_URL"
          gh pr merge --auto --squash "$PR_URL"

      - name: Disable auto-merge if multiple commits
        if: steps.validate_branch.outputs.valid_branch == 'true' && steps.check_commits.outputs.commit_count != '1'
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ENABLED_BY=$(gh pr view "$PR_URL" --json autoMergeRequest --jq '.autoMergeRequest.enabledBy.login // empty')
          echo "PR has ${{ steps.check_commits.outputs.commit_count }} commits; auto-merge enabled by: '${ENABLED_BY:-none}'"
          if [[ "$ENABLED_BY" == "github-actions[bot]" ]]; then
            echo "Disabling bot-enabled auto-merge"
            gh pr merge --disable-auto "$PR_URL"
          fi
      
      - name: Skip automerge
        if: steps.validate_branch.outputs.valid_branch != 'true'
        run: |
          echo "Skipping automerge - branch name does not match required pattern 'autolock/*'"