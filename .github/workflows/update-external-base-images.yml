name: Update external base images

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  update-docker-files:
    if: github.repository == 'demisto/dockerFiles'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v2
      - env:
          REPO_NAME: ${{ github.repository }}
        run: echo "💡 The $REPO_NAME repository has been cloned to the runner."
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Setup Poetry
        uses: Gr1N/setup-poetry@15821dc8a61bc630db542ae4baf6a7c19a994844 # v8
      - name: run
        env:
          DISABLE_TIMESTAMP_AUTOUPDATES: ${{ vars.DISABLE_TIMESTAMP_AUTOUPDATES }}
        run: |
            git config --global user.email ""
            git config --global user.name "auto dockerfiles update"
            echo "==== $(date): Starting pipenv setup... ===="
            python -m pip install --upgrade pip
            pip install pipenv==2024.4.0
            pipenv install --python=$(which python)
            echo "==== Finished ===="
            [[ "$DISABLE_TIMESTAMP_AUTOUPDATES" = 'true' ]] && tu_flag="--no-timestamp-updates"
            echo tu_flag being passed is $tu_flag
            pipenv run python ./utils/auto_dockerfile_update/update_dockerfiles.py $tu_flag
            echo "Done!"



